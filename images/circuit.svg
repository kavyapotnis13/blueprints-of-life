<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Almond leaf pointing right; origin at stem attachment -->
    <g id="leaf-r">
      <path d="M 0,0 Q 26,-16 52,7 Q 26,22 0,0 Z"
            stroke="white" stroke-width="1.4" fill="none" stroke-linejoin="round"/>
      <path d="M 0,0 L 48,6" stroke="white" stroke-width="1" fill="none" stroke-linecap="round"/>
    </g>
    <g id="leaf-l">
      <path d="M 0,0 Q -26,-16 -52,7 Q -26,22 0,0 Z"
            stroke="white" stroke-width="1.4" fill="none" stroke-linejoin="round"/>
      <path d="M 0,0 L -48,6" stroke="white" stroke-width="1" fill="none" stroke-linecap="round"/>
    </g>

    <g id="branch">
      <!-- Gently wavy central stem -->
      <path d="M 0,-300 C 8,-240 -8,-180 0,-120 C 8,-60 -8,0 0,60 C 8,120 -8,180 0,240 L 0,300"
            stroke="white" stroke-width="1.6" fill="none" stroke-linecap="round"/>
      <!-- Alternating leaves down the stem -->
      <use href="#leaf-r" transform="translate(0 -265)"/>
      <use href="#leaf-l" transform="translate(0 -212)"/>
      <use href="#leaf-r" transform="translate(0 -159)"/>
      <use href="#leaf-l" transform="translate(0 -106)"/>
      <use href="#leaf-r" transform="translate(0 -53)"/>
      <use href="#leaf-l" transform="translate(0 0)"/>
      <use href="#leaf-r" transform="translate(0 53)"/>
      <use href="#leaf-l" transform="translate(0 106)"/>
      <use href="#leaf-r" transform="translate(0 159)"/>
      <use href="#leaf-l" transform="translate(0 212)"/>
      <use href="#leaf-r" transform="translate(0 265)"/>
    </g>
  </defs>

  <!-- Left branch, tilted diagonally inward -->
  <use href="#branch" transform="translate(140 300) rotate(22)"/>

  <!-- Right branch, mirrored -->
  <use href="#branch" transform="translate(1060 300) rotate(-22)"/>
</svg>
