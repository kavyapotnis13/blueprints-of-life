<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600">
  <defs>
    <g id="leaf">
      <path d="M 0,0 C -7,-3 -9,-13 -3,-20 C 0,-23 3,-23 7,-20 C 13,-13 11,-3 3,0 Z" fill="white"/>
      <path d="M 1,-2 L 2,-16" stroke="#5d70b8" stroke-width="0.6" stroke-linecap="round" fill="none"/>
    </g>
  </defs>

  <!-- Main circle (the logo's framing ring) -->
  <circle cx="300" cy="300" r="220" stroke="white" stroke-width="1.5" fill="none"/>

  <!-- Subtle outer ring for depth -->
  <circle cx="300" cy="300" r="244" stroke="white" stroke-width="0.7" fill="none" opacity="0.5"/>

  <!-- Cardinal radial traces extending past the circle -->
  <g stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round">
    <line x1="300" y1="80"  x2="300" y2="30"/>
    <line x1="300" y1="520" x2="300" y2="570"/>
    <line x1="80"  y1="300" x2="30"  y2="300"/>
    <line x1="520" y1="300" x2="570" y2="300"/>
  </g>

  <!-- Diagonal stub traces (shorter) -->
  <g stroke="white" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.85">
    <line x1="144" y1="144" x2="124" y2="124"/>
    <line x1="456" y1="144" x2="476" y2="124"/>
    <line x1="144" y1="456" x2="124" y2="476"/>
    <line x1="456" y1="456" x2="476" y2="476"/>
  </g>

  <!-- 8 dots evenly around the circle at off-cardinal positions -->
  <g fill="white">
    <circle cx="490" cy="190" r="3.5"/>
    <circle cx="490" cy="410" r="3.5"/>
    <circle cx="110" cy="190" r="3.5"/>
    <circle cx="110" cy="410" r="3.5"/>
    <circle cx="410" cy="110" r="3.5"/>
    <circle cx="190" cy="110" r="3.5"/>
    <circle cx="410" cy="490" r="3.5"/>
    <circle cx="190" cy="490" r="3.5"/>
  </g>

  <!-- 4 leaves at cardinal points, pointing outward — replaces dots there -->
  <use href="#leaf" transform="translate(300 80) rotate(0)"/>
  <use href="#leaf" transform="translate(520 300) rotate(90)"/>
  <use href="#leaf" transform="translate(300 520) rotate(180)"/>
  <use href="#leaf" transform="translate(80 300) rotate(-90)"/>
</svg>
