<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <g id="dna">
      <!-- Strand A — oscillates +30/-30 every 50 units -->
      <path d="M 30,-300
               C 30,-275 -30,-275 -30,-250
               C -30,-225 30,-225 30,-200
               C 30,-175 -30,-175 -30,-150
               C -30,-125 30,-125 30,-100
               C 30,-75 -30,-75 -30,-50
               C -30,-25 30,-25 30,0
               C 30,25 -30,25 -30,50
               C -30,75 30,75 30,100
               C 30,125 -30,125 -30,150
               C -30,175 30,175 30,200
               C 30,225 -30,225 -30,250
               C -30,275 30,275 30,300"
            stroke="white" stroke-width="1.6" fill="none" stroke-linecap="round"/>
      <!-- Strand B — opposite phase -->
      <path d="M -30,-300
               C -30,-275 30,-275 30,-250
               C 30,-225 -30,-225 -30,-200
               C -30,-175 30,-175 30,-150
               C 30,-125 -30,-125 -30,-100
               C -30,-75 30,-75 30,-50
               C 30,-25 -30,-25 -30,0
               C -30,25 30,25 30,50
               C 30,75 -30,75 -30,100
               C -30,125 30,125 30,150
               C 30,175 -30,175 -30,200
               C -30,225 30,225 30,250
               C 30,275 -30,275 -30,300"
            stroke="white" stroke-width="1.6" fill="none" stroke-linecap="round"/>
      <!-- Rungs at maximal separation points (every 50 units) -->
      <g stroke="white" stroke-width="1" stroke-linecap="round">
        <line x1="-30" y1="-300" x2="30" y2="-300"/>
        <line x1="-30" y1="-250" x2="30" y2="-250"/>
        <line x1="-30" y1="-200" x2="30" y2="-200"/>
        <line x1="-30" y1="-150" x2="30" y2="-150"/>
        <line x1="-30" y1="-100" x2="30" y2="-100"/>
        <line x1="-30" y1="-50"  x2="30" y2="-50"/>
        <line x1="-30" y1="0"    x2="30" y2="0"/>
        <line x1="-30" y1="50"   x2="30" y2="50"/>
        <line x1="-30" y1="100"  x2="30" y2="100"/>
        <line x1="-30" y1="150"  x2="30" y2="150"/>
        <line x1="-30" y1="200"  x2="30" y2="200"/>
        <line x1="-30" y1="250"  x2="30" y2="250"/>
        <line x1="-30" y1="300"  x2="30" y2="300"/>
      </g>
    </g>
  </defs>

  <!-- Left helix, tilted diagonally inward -->
  <use href="#dna" transform="translate(140 300) rotate(22)"/>

  <!-- Right helix, mirrored -->
  <use href="#dna" transform="translate(1060 300) rotate(-22)"/>
</svg>
